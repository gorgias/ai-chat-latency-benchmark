name: Monthly AI-chat benchmark

# Runs the headless, cold-session benchmark on the 1st of each month.
# Every CI run is a fresh container, so every vendor starts cold by construction.
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC, 1st of each month
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps + Chromium
        working-directory: runner
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run benchmark (cold, both modes)
        working-directory: runner
        run: node run.js
        continue-on-error: true   # one broken widget shouldn't fail the run

      - name: Commit results
        run: |
          git config user.name "benchmark-bot"
          git config user.email "actions@users.noreply.github.com"
          git add runner/results
          git commit -m "Monthly benchmark results $(date +%Y-%m-%d)" || echo "no changes"
          git push
